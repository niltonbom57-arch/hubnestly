<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 60" width="96" height="60">
  <defs>
    <linearGradient id="midArcM" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#267A45"/>
      <stop offset="100%" stop-color="#C04068"/>
    </linearGradient>
  </defs>

  <!-- Outer arc — forest green -->
  <path d="M 4,52 A 44,44 0 0,1 92,52"
    fill="none" stroke="#1A6335" stroke-width="8" stroke-linecap="round"/>

  <!-- Middle arc — gradient -->
  <path d="M 17,52 A 31,31 0 0,1 79,52"
    fill="none" stroke="url(#midArcM)" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Inner arc — rose -->
  <path d="M 32,52 A 16,16 0 0,1 64,52"
    fill="none" stroke="#D03258" stroke-width="5" stroke-linecap="round"/>

  <!-- Hub dot -->
  <circle cx="48" cy="52" r="5.5" fill="#0F3320"/>
  <circle cx="48" cy="52" r="2"   fill="#FAF5F0"/>
</svg>
