<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 80" width="460" height="80">
  <defs>
    <!-- Forest gradient for "Hub" -->
    <linearGradient id="gText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2E8A50"/>
      <stop offset="100%" stop-color="#0F3320"/>
    </linearGradient>
    <!-- Rose gradient for "Nestly" -->
    <linearGradient id="rText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0A0B4"/>
      <stop offset="100%" stop-color="#D03258"/>
    </linearGradient>
    <!-- Middle arc gradient: forest → rose -->
    <linearGradient id="midArc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#267A45"/>
      <stop offset="100%" stop-color="#C04068"/>
    </linearGradient>
    <!-- Separator: green → rose → transparent -->
    <linearGradient id="sep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#267A45" stop-opacity="0.9"/>
      <stop offset="45%"  stop-color="#B03860" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#E04060" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════
       MARK — three nest arcs + hub dot
       Bowl opens upward, centred at 48,52
  ═══════════════════════════════════ -->

  <!-- Outer arc — forest green -->
  <path d="M 4,52 A 44,44 0 0,1 92,52"
    fill="none" stroke="#1A6335" stroke-width="8" stroke-linecap="round"/>

  <!-- Middle arc — forest→rose gradient via rect clip trick -->
  <path d="M 17,52 A 31,31 0 0,1 79,52"
    fill="none" stroke="url(#midArc)" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Inner arc — rose -->
  <path d="M 32,52 A 16,16 0 0,1 64,52"
    fill="none" stroke="#D03258" stroke-width="5" stroke-linecap="round"/>

  <!-- Hub dot -->
  <circle cx="48" cy="52" r="5.5" fill="#0F3320"/>
  <circle cx="48" cy="52" r="2"   fill="#FAF5F0"/>

  <!-- ═══════════════════════════════════
       WORDMARK — equal weight, split color
  ═══════════════════════════════════ -->

  <text font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="44" font-weight="600" letter-spacing="-1.2">
    <tspan x="112" y="58" fill="url(#gText)">Hub</tspan><tspan fill="url(#rText)" letter-spacing="-0.6">Nestly</tspan>
  </text>

  <!-- Separator line -->
  <rect x="112" y="65" width="340" height="0.9" rx="0.45" fill="url(#sep)"/>

  <!-- Tagline -->
  <text x="114" y="76"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="9.5" font-weight="400" letter-spacing="4"
    fill="#1A6335" opacity="0.45">HOME CARE PLATFORM</text>
</svg>
